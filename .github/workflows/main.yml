name: CI_Conversor
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black pytest  # <--- Agregamos black aquí
          pip install -r requirements.txt
          
      - name: Check code style (Black)
        run: black --check .  # <--- Esto fallará si el código está desordenado
          
      - name: Run tests
        run: |
          python -m pytest